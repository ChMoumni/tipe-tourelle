<!DOCTYPE html>
<html>
<head>
    <title>Mon Modèle 3D (Sans Grille)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            font-family: Arial;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        🧩 Modèle 3D | Glisser pour tourner | Click droit pour déplacer
    </div>

    <!-- On importe la bibliothèque Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        // --- 1. Configuration de la scène ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Fond gris foncé

        // --- 2. Caméra ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        camera.lookAt(0, 0, 0);

        // --- 3. Rendu ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 4. Contrôles (Souris) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // Inertie
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;

        // --- 5. LUMIÈRES (pour remplacer la grille et donner du relief) ---
        // Lumière ambiante douce
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Lumière directionnelle principale (genre soleil)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        
        // Lumière de remplissage arrière pour éviter les ombres trop dures
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-1, 1, -1);
        scene.add(backLight);
        
        // Petite lumière venant d'en bas pour éclaircir le dessous
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);

        // Optionnel: Afficher un plan de réception d'ombre au sol (si vraiment vous voulez un repère)
        // Mais on ne met PAS de grille par défaut. Si vous voulez une ombre posée, décommentez ceci :
        /*
        const planeGeometry = new THREE.PlaneGeometry(5, 5);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -1;
        plane.receiveShadow = true;
        scene.add(plane);
        */

        // --- 6. Chargement de votre fichier STL ---
        const loader = new STLLoader();
        // ** ATTENTION **
        // Remplacez 'votre_fichier.stl' par le chemin exact de votre STL dans le dépôt
        loader.load('votre_fichier.stl', function (geometry) {
            // On calcule le centre pour recentrer la caméra automatiquement
            geometry.computeBoundingBox();
            const center = geometry.boundingBox.getCenter(new THREE.Vector3());
            
            // Matériau métal/or (pour un beau rendu)
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xffaa44, 
                metalness: 0.7, 
                roughness: 0.3,
                emissive: 0x221100
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Recentrer le modèle
            mesh.position.x = -center.x;
            mesh.position.y = -center.y;
            mesh.position.z = -center.z;
            
            scene.add(mesh);
            
            // Ajuster la caméra en fonction de la taille du modèle
            const size = geometry.boundingBox.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const distance = maxDim / (2 * Math.tan(camera.fov * Math.PI / 360));
            camera.position.set(distance * 1.5, distance * 1.2, distance * 1.5);
            controls.target.set(0, 0, 0);
            controls.update();
        }, undefined, function (error) {
            console.error('Erreur de chargement du STL :', error);
            document.getElementById('info').innerHTML = '❌ Erreur : Fichier STL introuvable. Vérifiez le chemin dans le code.';
        });

        // --- 7. Animation ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Met à jour les contrôles
            renderer.render(scene, camera);
        }
        animate();

        // Gestion du redimensionnement de la fenêtre
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
